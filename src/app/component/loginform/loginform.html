<div class="min-h-screen bg-[#FDF8F5] flex items-center justify-center p-6 font-sans">
  <div
    class="max-w-md w-full bg-white rounded-3xl shadow-xl shadow-gray-100 border border-gray-100 overflow-hidden"
  >
    <div class="bg-white p-8 pb-4 text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-gray-900 rounded-2xl mb-4">
        <i class="fas fa-utensils text-3xl text-white"></i>
      </div>
      <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Welcome Back!</h1>
      <p class="text-gray-600 text-sm mt-2">Login to manage Task</p>
    </div>

    <div class="p-8 pt-6 bg-white">
      <form class="space-y-6">
        <div>
          <label class="block text-sm font-semibold text-gray-800 mb-2">Email Address</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
              <i class="far fa-envelope"></i>
            </span>
            <input
              type="email"
              class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-gray-900 focus:border-transparent outline-none transition-all placeholder:text-gray-300"
              placeholder="admin@restaurant.com"
            />
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-800 mb-2">Password</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
              <i class="fas fa-lock"></i>
            </span>
            <input
              type="password"
              class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-gray-900 focus:border-transparent outline-none transition-all placeholder:text-gray-300"
              placeholder="••••••••"
            />
          </div>
          <div class="text-right mt-2">
            <a href="#" class="text-sm text-gray-900 hover:text-black hover:underline font-medium"
              >Forgot Password?</a
            >
          </div>
        </div>

        <div class="flex items-center">
          <input
            type="checkbox"
            id="remember"
            class="w-4 h-4 text-gray-900 border-gray-300 rounded focus:ring-gray-900 focus:ring-offset-1"
          />
          <label for="remember" class="ml-2 text-sm text-gray-700 font-medium cursor-pointer"
            >Remember me</label
          >
        </div>

        <button
          type="submit"
          class="w-full bg-gray-900 hover:bg-black text-white font-bold py-4 rounded-xl shadow-lg shadow-gray-200/50 transition-all active:scale-95"
        >
          Log In
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-gray-100 text-center">
        <p class="text-gray-600 text-sm">
          Don't have an account?
          <a href="#" class="text-gray-900 font-bold hover:underline">Request Access</a>
        </p>
      </div>
    </div>
  </div>
</div>
