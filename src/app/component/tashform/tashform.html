<div class="min-h-screen bg-[#F8FAFC] p-8 flex flex-col items-center">
  
  <div class="w-full max-w-6xl flex justify-between items-center mb-12">
    <div>
      <h2 class="text-3xl font-black text-slate-900 tracking-tighter">My <span class="text-indigo-600">Tasks</span></h2>
      <p class="text-slate-500 text-sm font-bold uppercase tracking-widest">Manage your daily workflow</p>
    </div>
    <button (click)="openModal()" 
      class="px-8 py-4 rounded-2xl bg-linear-to-r from-indigo-600 to-blue-500 text-white font-black uppercase tracking-[0.15em] shadow-lg hover:scale-105 hover:shadow-indigo-200 transition-all duration-500">
      + New Task
    </button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 w-full max-w-6xl">
    @for (task of tasks; track task.id) {
    <div class="group relative bg-white border border-gray-100 p-8 rounded-[2.5rem] shadow-sm hover:shadow-2xl hover:shadow-indigo-100 transition-all duration-500">
      
      <div class="flex justify-between items-start mb-6">
        <span [class]="getStatusClass(task.status)" class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border">
          {{task.status}}
        </span>
        
        <div class="flex space-x-2">
          <button (click)="openModal(task)" class="p-2.5 rounded-xl bg-gray-50 text-indigo-600 hover:bg-indigo-600 hover:text-white transition-all shadow-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2.5 2.5 0 113.536 3.536L12 14.5l-4 1 1-4 9.414-9.414z"></path></svg>
          </button>
          <button (click)="deleteTask(task.id)" class="p-2.5 rounded-xl bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition-all shadow-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
          </button>
        </div>
      </div>

      <h3 class="text-2xl font-black text-slate-900 mb-3 group-hover:text-indigo-600 transition-colors">{{task.title}}</h3>
      <p class="text-slate-500 text-[15px] leading-relaxed font-medium mb-8 line-clamp-3 italic">"{{task.description}}"</p>

      <div class="pt-6 border-t border-gray-50 flex justify-between items-center">
        <div class="flex flex-col">
          <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Created</span>
          <span class="text-xs font-bold text-slate-900">{{task.createdAt | date:'mediumDate'}}</span>
        </div>
        <span class="text-[10px] font-black text-indigo-200">#{{task.id}}</span>
      </div>
    </div>
    }
  </div>

  @if (showModal) {
  <div class="fixed inset-0 z-100 flex items-center justify-center backdrop-blur-md bg-white/60 p-4">
    <div class="relative w-full max-w-lg bg-white border border-gray-100 p-10 rounded-[3rem] shadow-[0_30px_100px_rgba(0,0,0,0.15)] animate-fade-in">
      
      <button (click)="closeModal()" class="absolute top-8 right-8 text-gray-300 hover:text-indigo-600 transition-all">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>

      <h2 class="text-4xl font-black text-gray-900 mb-10 tracking-tighter">
        {{ isEditMode ? 'UPDATE' : 'CREATE' }} <span class="text-indigo-600 uppercase">Task</span>
      </h2>

      <form [formGroup]="taskForm" (ngSubmit)="saveTask()" class="space-y-8">
        <div class="space-y-3">
          <label class="text-[11px] font-black text-indigo-900/40 uppercase tracking-[0.2em] ml-2">Title Identification</label>
          <input type="text" formControlName="title" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-6 py-5 text-gray-900 font-bold focus:outline-none focus:border-indigo-500">
        </div>

        <div class="space-y-3">
          <label class="text-[11px] font-black text-indigo-900/40 uppercase tracking-[0.2em] ml-2">Detailed Description</label>
          <textarea formControlName="description" rows="3" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-6 py-5 text-gray-900 font-bold focus:outline-none focus:border-indigo-500"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-6">
          <div class="space-y-3">
            <label class="text-[11px] font-black text-indigo-900/40 uppercase tracking-[0.2em] ml-2">Priority Status</label>
            <select formControlName="status" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-5 text-gray-900 font-black uppercase text-xs appearance-none">
              <option value="Pending">Pending</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
            </select>
          </div>

          <div class="flex items-end">
             <button type="submit" [disabled]="taskForm.invalid"
               class="w-full py-5 rounded-2xl bg-white text-white font-black uppercase tracking-widest hover:bg-indigo-600 transition-all">
               {{ isEditMode ? 'Update Now' : 'Save Task' }}
             </button>
          </div>
        </div>
      </form>
    </div>
  </div>
  }
</div>
