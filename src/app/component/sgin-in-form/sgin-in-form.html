<div class="min-h-screen bg-[#FDFDFD] flex items-center justify-center p-6 font-sans">
  
  <div class="w-full max-w-md bg-white border border-slate-100 p-10 rounded-[3rem] shadow-[0_40px_100px_-20px_rgba(0,0,0,0.08)] relative overflow-hidden transition-all duration-500">
    
    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-400 via-indigo-500 to-purple-500"></div>

    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 rounded-3xl mb-6 group hover:scale-110 transition-transform duration-500">
        <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
        </svg>
      </div>
      <h2 class="text-3xl font-black text-slate-900 tracking-tighter uppercase">Welcome <span class="text-blue-600">Back</span></h2>
      <p class="text-slate-400 text-xs font-bold uppercase tracking-[0.2em] mt-2">Enter your credentials to access tasks</p>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
      <button class="flex items-center justify-center py-3 px-4 rounded-2xl border border-slate-100 hover:bg-slate-50 transition-all font-bold text-xs text-slate-600 space-x-2">
        <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-4 h-4" alt="Google">
        <span>Google</span>
      </button>
      <button class="flex items-center justify-center py-3 px-4 rounded-2xl border border-slate-100 hover:bg-slate-50 transition-all font-bold text-xs text-slate-600 space-x-2">
        <img src="https://www.svgrepo.com/show/512317/github-142.svg" class="w-4 h-4" alt="Github">
        <span>GitHub</span>
      </button>
    </div>

    <div class="relative flex py-5 items-center">
      <div class="flex-grow border-t border-slate-100"></div>
      <span class="flex-shrink mx-4 text-[10px] font-black text-slate-300 uppercase tracking-widest">or email</span>
      <div class="flex-grow border-t border-slate-100"></div>
    </div>

    <form class="space-y-6">
      <div class="space-y-2">
        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Email Address</label>
        <div class="relative">
          <input type="email" placeholder="name@company.com" 
            class="w-full bg-slate-50 border-none rounded-2xl px-6 py-4 text-slate-900 font-bold focus:ring-2 focus:ring-blue-500/20 transition-all placeholder-slate-300 outline-none">
        </div>
      </div>

      <div class="space-y-2">
        <div class="flex justify-between items-center px-1">
          <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Password</label>
          <a href="#" class="text-[10px] font-black text-blue-600 uppercase tracking-widest hover:underline">Forgot?</a>
        </div>
        <div class="relative">
          <input type="password" placeholder="••••••••" 
            class="w-full bg-slate-50 border-none rounded-2xl px-6 py-4 text-slate-900 font-bold focus:ring-2 focus:ring-blue-500/20 transition-all placeholder-slate-300 outline-none">
        </div>
      </div>

      <button type="submit" 
        class="w-full py-4 rounded-2xl bg-slate-900 text-white font-bold uppercase tracking-widest hover:bg-blue-600 hover:-translate-y-1 transition-all duration-300 shadow-xl shadow-slate-200 mt-4">
        Sign In
      </button>
    </form>

    <p class="text-center mt-10 text-slate-500 text-xs font-medium">
      Don't have an account? 
      <a href="#" class="text-blue-600 font-black uppercase tracking-widest hover:underline ml-1">Register Now</a>
    </p>

  </div>
</div>
