<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 p-6">
  @for (task of tasks; track task.id) {
  <div
       class="relative group overflow-hidden bg-white border border-slate-200 p-8 rounded-[2.5rem] shadow-[0_4px_20px_rgba(0,0,0,0.03)] transition-all duration-500 hover:scale-[1.02] hover:shadow-[0_25px_50px_-12px_rgba(0,0,0,0.08)] hover:border-blue-400/50">
    
    <div class="absolute -inset-px bg-linear-to-br from-blue-50/50 via-transparent to-indigo-50/50 rounded-[2.5rem] opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>

    <div class="relative z-10">
      <div class="flex justify-between items-center mb-6">
        <span class="text-[10px] font-black tracking-[0.2em] text-slate-400 uppercase">#ID-{{task.id}}</span>
        
        <span
          class="px-4 py-1.5 rounded-xl text-[10px] font-black uppercase border tracking-[0.15em] transition-all duration-300"
          [class.bg-orange-50]="task.status === 'Pending'"
          [class.text-orange-600]="task.status === 'Pending'"
          [class.border-orange-100]="task.status === 'Pending'"
          [class.bg-emerald-50]="task.status === 'Completed'"
          [class.text-emerald-600]="task.status === 'Completed'"
          [class.border-emerald-100]="task.status === 'Completed'"
          [class.bg-blue-50]="task.status === 'In Progress'"
          [class.text-blue-600]="task.status === 'In Progress'"
          [class.border-blue-100]="task.status === 'In Progress'">
          {{task.status}}
        </span>
      </div>

      <h3 class="text-2xl font-bold text-slate-800 mb-3 leading-tight group-hover:text-blue-600 transition-colors">
        {{task.title}}
      </h3>

      <p class="text-slate-500 text-[15px] leading-relaxed mb-10 font-medium opacity-90 group-hover:opacity-100 transition-opacity">
        {{task.description}}
      </p>

      <div class="flex items-center justify-between pt-6 border-t border-slate-100">
        <div class="flex flex-col">
          <span class="text-[9px] text-slate-400 uppercase font-black tracking-[0.15em] mb-1">Registration Date</span>
          <span class="text-sm text-slate-700 font-bold tracking-tight">{{task.createdAt | date:'mediumDate'}}</span>
        </div>
        
        <button class="p-3 rounded-2xl bg-slate-50 text-slate-400 border border-slate-100 hover:bg-blue-600 hover:text-white hover:border-blue-600 hover:shadow-lg hover:shadow-blue-200 transition-all duration-300 group/btn">
          <svg class="w-5 h-5 group-hover/btn:scale-110 transition-transform" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.75h.008v.008H12V6.75zm0 5.25h.008v.008H12V12zm0 5.25h.008v.008H12v-.008z"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>
  }
</div>
